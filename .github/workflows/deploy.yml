name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ secrets.AWS_REGION }}
        # If using OIDC:
        role-to-assume: arn:aws:iam::955030484275:role/oidc-role

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPO:latest .
      env:
        ECR_REPO: ${{ secrets.ECR_REPOSITORY }}

    - name: Tag image
      run: |
        docker tag $ECR_REPO:latest <ACCOUNT-ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$ECR_REPO:latest
      env:
        ECR_REPO: ${{ secrets.ECR_REPOSITORY }}

    - name: Push to ECR
      run: |
        docker push <ACCOUNT-ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$ECR_REPO:latest
      env:
        ECR_REPO: ${{ secrets.ECR_REPOSITORY }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
        EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy to EKS
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
        kubectl rollout restart deployment python-app